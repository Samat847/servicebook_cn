name: servicebook_cn
description: "Приложение AvtoMAN для учёта обслуживания автомобилей. Ведите историю ТО, отслеживайте расходы, храните документы и получайте напоминания."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  package_info_plus: ^8.3.1

  # Notifications
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0

  # PDF and documents
  pdf: ^3.11.3
  printing: ^5.14.2

  # File handling
  share_plus: ^10.1.4
  file_picker: ^11.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0

  # State management
  provider: ^6.1.5
  
  # Crypto for password hashing
  crypto: ^3.0.6
  
  # URL launcher for email
  url_launcher: ^6.3.1
  geolocator: ^13.0.4
  
  # Video player for splash screen
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/
    - assets/videos/

  # Default system fonts are used (Roboto on Android)