name: servicebook_cn
description: "Приложение AvtoMAN для учёта обслуживания автомобилей. Ведите историю ТО, отслеживайте расходы, храните документы и получайте напоминания."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  package_info_plus: ^8.3.1

  # Notifications
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4

  # PDF and documents
  pdf: ^3.10.0
  printing: ^5.12.0

  # File handling
  share_plus: ^8.0.0
  file_picker: ^10.1.8
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # State management
  provider: ^6.1.0
  
  # Crypto for password hashing
  crypto: ^3.0.3
  
  # URL launcher for email
  url_launcher: ^6.2.0
  geolocator: ^12.0.0
  
  # Video player for splash screen
  video_player: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/
    - assets/videos/

  # Default system fonts are used (Roboto on Android)